<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer dark border -->
  <circle cx="32" cy="32" r="30" fill="#3D3D3D" />
  <!-- Coin body -->
  <circle cx="32" cy="32" r="27" fill="#F5C542" />
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#E5A83A" stroke-width="2" />
  <!-- Left eye -->
  <circle cx="24" cy="28" r="2.5" fill="#3D3D3D" />
  <!-- Right eye -->
  <circle cx="40" cy="28" r="2.5" fill="#3D3D3D" />
  <!-- Smile -->
  <path d="M 24 37 Q 32 44 40 37" fill="none" stroke="#3D3D3D" stroke-width="2" stroke-linecap="round" />
  <!-- Left blush -->
  <ellipse cx="19" cy="36" rx="3.5" ry="2.5" fill="#F0A0A0" opacity="0.6" />
  <!-- Right blush -->
  <ellipse cx="45" cy="36" rx="3.5" ry="2.5" fill="#F0A0A0" opacity="0.6" />
</svg>
